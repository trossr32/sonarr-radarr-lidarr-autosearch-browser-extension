name: Playwright tests

on:
  pull_request:
    branches: [ staging, main, master ]
    types:
      - opened
      - synchronize
    paths:
      - '.github/workflows/playwright.yml'
      - 'src/**'
      - 'tests/playwright/**'
      - 'package.json'
      
  schedule:
    - cron: '0 6 1,16 * *'

  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  # First job: setup and build extension artifacts
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          
      - name: Publish extension to dist folder
        run: |
          npm ci
          npm i grunt -g
          grunt playwright

      - name: Install test dependencies
        run: npm ci
        working-directory: tests/playwright

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
        working-directory: tests/playwright

      # Upload the built extension
      - name: Upload extension artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extension-dist
          path: dist/
          retention-days: 1

      # Upload node_modules from the test directory (includes Playwright browsers)
      - name: Upload test dependencies
        uses: actions/upload-artifact@v7
        with:
          name: test-node-modules
          path: |
            tests/playwright/node_modules/
            tests/playwright/package.json
            tests/playwright/package-lock.json
          retention-days: 1

      # Upload the Playwright cache (browsers and dependencies)
      - name: Upload Playwright cache
        uses: actions/upload-artifact@v7
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright/
          retention-days: 1

  # Second job: discover all the *.spec.ts files and output a JSON matrix.
  discover-tests:
    needs: setup
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Discover tests
        id: discover
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const dir = 'tests/playwright/site.integrations.tests';
            // *.spec.ts only (this naturally excludes the *.spec.NORUN.ts files).
            const files = fs.readdirSync(dir).filter(f => f.endsWith('.spec.ts'));

            // Only apply the skip / tracking-issue state machine on the default
            // branch (scheduled or manual dispatch). On PRs we always run every
            // test and never touch issues — a PR might be the fix.
            const isDefaultBranch =
              context.ref === 'refs/heads/main' || context.ref === 'refs/heads/master';

            const BASE_LABEL = 'failed-tests';      // all auto-filed issues carry this
            const SKIP_LABEL = 'confirmed-failing';  // marker -> skip the test next run
            const titleFor = (name) => `Playwright test failed: ${name}`;

            // Map currently-open auto-filed issues by their (trimmed) title.
            const issuesByTitle = new Map();
            if (isDefaultBranch) {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: BASE_LABEL,
                per_page: 100,
              });
              for (const issue of openIssues) {
                issuesByTitle.set((issue.title || '').trim(), issue);
              }
            }

            const tests = [];
            for (const file of files) {
              const name = path.basename(file, '.spec.ts');
              let issue = ''; // tracking issue number for this test, '' if none
              if (isDefaultBranch) {
                const existing = issuesByTitle.get(titleFor(name));
                if (existing) {
                  const marked = (existing.labels || [])
                    .some(l => (typeof l === 'string' ? l : l.name) === SKIP_LABEL);
                  if (marked) {
                    // Confirmed failing -> skip: leave it out of the matrix entirely.
                    core.info(`Skipping "${name}" — issue #${existing.number} is "${SKIP_LABEL}"`);
                    continue;
                  }
                  // Issue exists but not yet confirmed -> run again this time.
                  issue = String(existing.number);
                }
              }
              tests.push({ name, file, issue });
            }

            const matrix = { tests };
            core.setOutput('matrix', JSON.stringify(matrix));
            core.info(`Discovered matrix: ${JSON.stringify(matrix)}`);
  
  # Third job: run tests in parallel using shared artifacts
  test:
    name: ${{ matrix.tests.name }}
    needs: [setup, discover-tests]
    timeout-minutes: 10
    strategy:
      matrix: ${{ fromJson(needs.discover-tests.outputs.matrix) }}
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      # Download the pre-built extension
      - name: Download extension artifacts
        uses: actions/download-artifact@v7
        with:
          name: extension-dist
          path: dist/

      # Download test dependencies
      - name: Download test dependencies
        uses: actions/download-artifact@v7
        with:
          name: test-node-modules
          path: tests/playwright/

      # Download Playwright cache
      - name: Download Playwright cache
        uses: actions/download-artifact@v7
        with:
          name: playwright-cache
          path: ~/.cache/ms-playwright/

      # Restore node_modules and ensure Playwright is available
      - name: Restore test environment
        run: |
          cd tests/playwright
          
          # Ensure .bin directory exists and has proper permissions
          if [ -d "node_modules/.bin" ]; then
            find node_modules/.bin -type f -exec chmod +x {} \;
          fi

          # Restore execute bits on all Chromium binaries (artifact download strips perms).
          # Match chrome-linux64 (Playwright's Chrome-for-Testing builds) as well as the
          # legacy chrome-linux directory, plus the headless-shell binary.
          find ~/.cache/ms-playwright -path '*/chrome-linux*/*' -type f -exec chmod +x {} \; 2>/dev/null || true
          
          # Reinstall playwright if .bin/playwright is missing
          if [ ! -f "node_modules/.bin/playwright" ]; then
            echo "Playwright binary not found, reinstalling..."
            npm install playwright
          fi
          
          # Verify playwright is available
          ./node_modules/.bin/playwright --version || npx playwright --version

      - name: Run Playwright test for ${{ matrix.tests.name }}
        run: ./node_modules/.bin/playwright test ${{ matrix.tests.file }}
        working-directory: tests/playwright

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.tests.name }}
          path: tests/playwright/playwright-report/
          retention-days: 10

      # On the default branch (scheduled / manual dispatch) manage the per-test
      # tracking issue when the test FAILS:
      #   - no issue yet            -> create one (1st failure)
      #   - issue exists, unmarked  -> add the "confirmed-failing" label + comment
      #                                so the test is skipped on future runs (2nd failure)
      # (Tests whose issue is already marked never reach here — they're excluded
      #  from the matrix by the discover-tests job.)
      - name: Record failure in tracking issue
        if: failure() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/github-script@v9
        with:
          script: |
            const name = ${{ toJSON(matrix.tests.name) }};
            const file = ${{ toJSON(matrix.tests.file) }};
            const issueNumber = ${{ toJSON(matrix.tests.issue) }};
            const SKIP_LABEL = 'confirmed-failing';
            const title = `Playwright test failed: ${name}`;
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            if (issueNumber) {
              // Second consecutive failure: confirm + mark for skipping.
              const number = Number(issueNumber);
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: number, labels: [SKIP_LABEL],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: number,
                body: [
                  `❌ Failed again on [run ${context.runId}](${runUrl}).`,
                  '',
                  `Added the \`${SKIP_LABEL}\` label — this test will be **skipped** on future`,
                  'scheduled runs until this issue is closed.',
                ].join('\n'),
              });
              core.info(`Marked issue #${number} as "${SKIP_LABEL}"`);
            } else {
              // First failure: open a new tracking issue.
              const body = [
                '## Failure Report:',
                '',
                '> [!IMPORTANT]',
                `> Details on failed run: ${runUrl}`,
                '',
                `- **Test File:** \`${file}\``,
                '- **Author:** trossr32',
                `- **Branch:** \`${context.ref}\``,
                `- **Commit:** ${context.sha}`,
                `- **Workflow:** \`${process.env.GITHUB_WORKFLOW_REF || ''}\``,
              ].join('\n');
              const created = await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body,
                labels: ['bug', 'failed-tests'],
                assignees: [context.repo.owner],
              });
              core.info(`Created issue #${created.data.number}`);
            }

      # If the test PASSES and it had an open (unmarked) tracking issue, the
      # integration has recovered: comment and close the issue.
      - name: Resolve tracking issue on success
        if: success() && matrix.tests.issue != '' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/github-script@v9
        with:
          script: |
            const number = Number(${{ toJSON(matrix.tests.issue) }});
            const runUrl =
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: number,
              body: `✅ Passed again on [run ${context.runId}](${runUrl}) — closing as resolved.`,
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: number, state: 'closed', state_reason: 'completed',
            });
            core.info(`Closed issue #${number}`);
